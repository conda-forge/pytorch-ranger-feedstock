{% set name = "pytorch-ranger" %}
{% set version = "0.1.1" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pytorch_ranger-{{ version }}.tar.gz
  sha256: aa7115431cef11b57d7dd7bc86e7302a911dae467f62ec5d0b10e1ff744875db

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}
    - pytorch >=1.7

test:
  imports:
    - pytorch_ranger
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/mpariente/Ranger-Deep-Learning-Optimizer
  summary: Ranger - a synergistic optimizer using RAdam (Rectified Adam) and LookAhead in one codebase
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - sarthakpati
